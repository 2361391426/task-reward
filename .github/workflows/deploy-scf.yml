name: 自动部署腾讯云函数

on:
  push:
    branches:
      - main
      - master
    paths:
      - "task-reward-backend/**"
      - ".github/workflows/deploy-scf.yml"
  workflow_dispatch:

concurrency:
  group: deploy-scf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 构建并发布后端
    runs-on: windows-latest

    defaults:
      run:
        working-directory: task-reward-backend

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: task-reward-backend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 校验部署密钥
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          CRYPTO_IV: ${{ secrets.CRYPTO_IV }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TASK_LIFECYCLE_SWEEP_SECRET: ${{ secrets.TASK_LIFECYCLE_SWEEP_SECRET }}
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          $required = @(
            'DATABASE_URL',
            'JWT_SECRET',
            'CRYPTO_KEY',
            'CRYPTO_IV',
            'WECHAT_APPID',
            'WECHAT_SECRET',
            'R2_ENDPOINT',
            'R2_BUCKET',
            'R2_PUBLIC_URL',
            'R2_ACCESS_KEY_ID',
            'R2_SECRET_ACCESS_KEY',
            'TENCENT_SECRET_ID',
            'TENCENT_SECRET_KEY'
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "缺少 GitHub Secrets：$($missing -join ', ')"
          }
          if ([string]::IsNullOrWhiteSpace($env:TASK_LIFECYCLE_SWEEP_SECRET)) {
            Write-Host "未配置 TASK_LIFECYCLE_SWEEP_SECRET，将使用 JWT_SECRET 派生调度密钥"
          }
          Write-Host "部署密钥校验通过"

      - name: 生成生产环境配置
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          CRYPTO_IV: ${{ secrets.CRYPTO_IV }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_TEMPLATE_TASK_STARTED: ${{ secrets.WECHAT_TEMPLATE_TASK_STARTED }}
          WECHAT_TEMPLATE_TASK_REVIEW_APPROVED: ${{ secrets.WECHAT_TEMPLATE_TASK_REVIEW_APPROVED }}
          WECHAT_TEMPLATE_TASK_REVIEW_REJECTED: ${{ secrets.WECHAT_TEMPLATE_TASK_REVIEW_REJECTED }}
          WECHAT_TEMPLATE_WITHDRAWAL_PROCESSED: ${{ secrets.WECHAT_TEMPLATE_WITHDRAWAL_PROCESSED }}
          WECHAT_TEMPLATE_TASK_TIMEOUT: ${{ secrets.WECHAT_TEMPLATE_TASK_TIMEOUT }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_DISPLAY_NAME: ${{ secrets.ADMIN_DISPLAY_NAME }}
          ADMIN_PHONE: ${{ secrets.ADMIN_PHONE }}
          TASK_LIFECYCLE_SWEEP_SECRET: ${{ secrets.TASK_LIFECYCLE_SWEEP_SECRET }}
          DB_QUERY_TIMEOUT_MS: ${{ secrets.DB_QUERY_TIMEOUT_MS }}
        run: |
          $sweepSecret = $env:TASK_LIFECYCLE_SWEEP_SECRET
          if ([string]::IsNullOrWhiteSpace($sweepSecret)) {
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $bytes = [System.Text.Encoding]::UTF8.GetBytes("$($env:JWT_SECRET):task-lifecycle")
            $sweepSecret = -join ($sha.ComputeHash($bytes) | ForEach-Object { $_.ToString("x2") })
          }
          $items = [ordered]@{
            NODE_ENV = 'production'
            DATABASE_URL = $env:DATABASE_URL
            JWT_SECRET = $env:JWT_SECRET
            CRYPTO_KEY = $env:CRYPTO_KEY
            CRYPTO_IV = $env:CRYPTO_IV
            WECHAT_APPID = $env:WECHAT_APPID
            WECHAT_SECRET = $env:WECHAT_SECRET
            WECHAT_APPSECRET = $env:WECHAT_APPSECRET
            WECHAT_TEMPLATE_TASK_STARTED = $env:WECHAT_TEMPLATE_TASK_STARTED
            WECHAT_TEMPLATE_TASK_REVIEW_APPROVED = $env:WECHAT_TEMPLATE_TASK_REVIEW_APPROVED
            WECHAT_TEMPLATE_TASK_REVIEW_REJECTED = $env:WECHAT_TEMPLATE_TASK_REVIEW_REJECTED
            WECHAT_TEMPLATE_WITHDRAWAL_PROCESSED = $env:WECHAT_TEMPLATE_WITHDRAWAL_PROCESSED
            WECHAT_TEMPLATE_TASK_TIMEOUT = $env:WECHAT_TEMPLATE_TASK_TIMEOUT
            R2_ENDPOINT = $env:R2_ENDPOINT
            R2_BUCKET = $env:R2_BUCKET
            R2_PUBLIC_URL = $env:R2_PUBLIC_URL
            R2_ACCESS_KEY_ID = $env:R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY = $env:R2_SECRET_ACCESS_KEY
            ADMIN_USERNAME = $env:ADMIN_USERNAME
            ADMIN_PASSWORD = $env:ADMIN_PASSWORD
            ADMIN_DISPLAY_NAME = $env:ADMIN_DISPLAY_NAME
            ADMIN_PHONE = $env:ADMIN_PHONE
            TASK_LIFECYCLE_SWEEP_SECRET = $sweepSecret
            DB_QUERY_TIMEOUT_MS = $env:DB_QUERY_TIMEOUT_MS
          }
          $lines = @()
          foreach ($key in $items.Keys) {
            if (![string]::IsNullOrWhiteSpace($items[$key])) {
              $lines += "$key=$($items[$key])"
            }
          }
          [System.IO.File]::WriteAllText(".env.scf", ($lines -join "`n") + "`n", [System.Text.Encoding]::UTF8)
          Write-Host "已生成 .env.scf，敏感值不会输出到日志"

      - name: 校验生产配置
        env:
          CHECK_MODE: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          CRYPTO_IV: ${{ secrets.CRYPTO_IV }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: npm run check

      - name: 初始化并迁移数据库
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: npm run migrate

      - name: 构建腾讯云函数压缩包
        run: npm run build:scf

      - name: 发布到腾讯云函数
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_REGION: ${{ secrets.TENCENT_REGION }}
          SCF_FUNCTION_NAME: ${{ secrets.SCF_FUNCTION_NAME }}
          SCF_NAMESPACE: ${{ secrets.SCF_NAMESPACE }}
          SCF_HANDLER: ${{ secrets.SCF_HANDLER }}
          SCF_TIMEOUT: ${{ secrets.SCF_TIMEOUT }}
        run: npm run deploy:scf

      - name: 发布后健康检查
        shell: powershell
        env:
          API_BASE: ${{ secrets.PRODUCTION_API_BASE_URL }}
          SMOKE_SKIP_AUTH: "true"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:API_BASE)) {
            Write-Host "未配置 PRODUCTION_API_BASE_URL，跳过发布后健康检查"
            exit 0
          }
          npm run smoke
